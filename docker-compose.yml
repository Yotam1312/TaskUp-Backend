version: "3.8"

services:
  postgres:
    image: postgres:latest
    container_name: taskup-postgres
    environment:
      POSTGRES_USER: taskup_user
      POSTGRES_PASSWORD: taskup_pass
      POSTGRES_DB: taskup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # מריץ את הschema אוטומטית
    networks:
      - taskup-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taskup-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taskup.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - taskup-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  taskup-network:
    driver: bridge
